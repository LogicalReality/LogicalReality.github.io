<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Terminal background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <!-- Neon border glow -->
  <rect x="1" y="1" width="30" height="30" rx="3.5" stroke="#00FF41" stroke-width="1" stroke-opacity="0.6"/>
  <!-- L letterform -->
  <path d="M5 8 L5 24 L13 24" stroke="#00FF41" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- R letterform -->
  <path d="M16 8 L16 24" stroke="#00FF41" stroke-width="2.5" stroke-linecap="square" fill="none"/>
  <path d="M16 8 L22 8 Q26 8 26 12 Q26 16 22 16 L16 16" stroke="#00FF41" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <path d="M20 16 L26 24" stroke="#00FF41" stroke-width="2.5" stroke-linecap="square" fill="none"/>
  <!-- Cursor blink indicator (bottom right pixel) -->
  <rect x="27" y="27" width="3" height="3" fill="#00FF41" opacity="0.8"/>
</svg>